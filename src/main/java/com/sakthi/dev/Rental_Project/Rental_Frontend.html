

<script>
const BASE = 'https://rentalhomeproject-production.up.railway.app';
let token = localStorage.getItem('rental_token') || '';
let userEmail = localStorage.getItem('rental_email') || '';

// ─── AUTH HELPERS ──────────────────────────────────────────────
function authHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
}
function showMsg(id, text, type) {
  const el = document.getElementById(id);
  el.className = 'msg ' + type;
  el.textContent = text;
}
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?0:1)===i));
  document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
}

// ─── LOGIN / REGISTER ──────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPass').value;
  if (!email || !password) return showMsg('loginMsg', 'Please fill in all fields.', 'error');
  try {
    const res = await fetch(BASE + '/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
    const data = await res.json();
    if (!res.ok) return showMsg('loginMsg', data || 'Login failed', 'error');
    token = data.token;
    localStorage.setItem('rental_token', token);
    localStorage.setItem('rental_email', email);
    userEmail = email;
    enterApp();
  } catch(e) { showMsg('loginMsg', 'Cannot connect to server. Is the backend running?', 'error'); }
}

async function doRegister() {
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPass').value;
  if (!email || !password) return showMsg('regMsg', 'Please fill in all fields.', 'error');
  try {
    const res = await fetch(BASE + '/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
    const text = await res.text();
    if (!res.ok) return showMsg('regMsg', text || 'Registration failed', 'error');
    showMsg('regMsg', 'Account created! You can now login.', 'success');
    switchAuthTab('login');
  } catch(e) { showMsg('regMsg', 'Cannot connect to server. Is the backend running?', 'error'); }
}

function doLogout() {
  token = ''; userEmail = '';
  localStorage.removeItem('rental_token');
  localStorage.removeItem('rental_email');
  document.getElementById('authPage').classList.add('active');
  document.getElementById('appPage').classList.remove('active');
}

function enterApp() {
  document.getElementById('authPage').classList.remove('active');
  document.getElementById('appPage').classList.add('active');
  document.getElementById('username-badge').textContent = '👤 ' + userEmail;
  switchTab('browse');
}

// ─── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  ['browse','mine','create'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.tab').forEach((el,i) => {
    el.classList.toggle('active', ['browse','mine','create'][i] === tab);
  });
  if (tab === 'browse') loadBrowse();
  if (tab === 'mine') loadMine();
}

// ─── BROWSE ───────────────────────────────────────────────────
async function loadBrowse() {
  document.getElementById('browseLoading').style.display = 'flex';
  document.getElementById('browseGrid').innerHTML = '';
  try {
    const res = await fetch(BASE + '/Home', { headers: authHeaders() });
    const houses = await res.json();
    document.getElementById('browseLoading').style.display = 'none';
    if (!houses.length) {
      document.getElementById('browseGrid').innerHTML = '<div class="empty-state"><div class="icon">🏘</div><div>No listings available yet.</div></div>';
      return;
    }
    document.getElementById('browseGrid').innerHTML = houses.map(h => houseCard(h, false)).join('');
  } catch(e) {
    document.getElementById('browseLoading').style.display = 'none';
    document.getElementById('browseGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>Could not load listings. Check server connection.</div></div>';
  }
}


// ─── MY LISTINGS ───────────────────────────────────────────────
async function loadMine() {
  document.getElementById('mineLoading').style.display = 'flex';
  document.getElementById('mineGrid').innerHTML = '';
  try {
    const res = await fetch(BASE + '/my-houses', { headers: authHeaders() });
    const houses = await res.json();
    document.getElementById('mineLoading').style.display = 'none';
    if (!houses.length) {
      document.getElementById('mineGrid').innerHTML = '<div class="empty-state"><div class="icon">🏠</div><div>You have no listings yet.<br><br><button class="btn btn-primary" onclick="switchTab(\'create\')">Add Your First Listing</button></div></div>';
      return;
    }
    document.getElementById('mineGrid').innerHTML = houses.map(h => houseCard(h, true)).join('');
  } catch(e) {
    document.getElementById('mineLoading').style.display = 'none';
    document.getElementById('mineGrid').innerHTML = '<div class="empty-state"><div class="icon">⚠️</div><div>Could not load your listings.</div></div>';
  }
}

// ─── HOUSE CARD ────────────────────────────────────────────────
function houseCard(h, isOwner) {
  const mapLink = h.MapLink ? `<a href="${h.MapLink}" target="_blank">📍 View on Map</a>` : '';
  const actions = isOwner ? `
    <div class="card-actions">
      <button class="btn btn-ghost btn-sm" onclick='openEditModal(${JSON.stringify(h)})'>Edit</button>
      <button class="btn btn-danger btn-sm" onclick="doDelete(${h.id})">Delete</button>
    </div>` : '';
  return `
  <div class="house-card">
    <div class="house-card-header">
      <div class="house-icon">🏠</div>
      <span class="rent-badge">₹${h.RentPrice?.toLocaleString('en-IN') ?? '—'}/mo</span>
    </div>
    <div class="house-location">${h.Location || 'Unknown Location'}</div>
    <div class="house-meta">
      <span>📞 ${h.PhoneNumber ?? '—'}</span>
      ${mapLink}
    </div>
    ${actions}
  </div>`;
}

// ─── CREATE ────────────────────────────────────────────────────
async function doCreate() {
  const body = {
    Location: document.getElementById('cLocation').value.trim(),
    RentPrice: parseInt(document.getElementById('cRent').value) || null,
    PhoneNumber: parseInt(document.getElementById('cPhone').value) || null,
    MapLink: document.getElementById('cMap').value.trim()
  };
  if (!body.Location) return showMsg('createMsg','Location is required.','error');
  try {
    const res = await fetch(BASE + '/create', { method:'POST', headers: authHeaders(), body: JSON.stringify(body) });
    if (!res.ok) return showMsg('createMsg', 'Failed to create listing.', 'error');
    showMsg('createMsg', 'Listing created successfully!', 'success');
    ['cLocation','cRent','cPhone','cMap'].forEach(id => document.getElementById(id).value = '');
    setTimeout(() => switchTab('mine'), 1000);
  } catch(e) { showMsg('createMsg','Server error.','error'); }
}

// ─── EDIT MODAL ────────────────────────────────────────────────
function openEditModal(h) {
  document.getElementById('editId').value = h.id;
  document.getElementById('editLocation').value = h.Location || '';
  document.getElementById('editRent').value = h.RentPrice || '';
  document.getElementById('editPhone').value = h.PhoneNumber || '';
  document.getElementById('editMap').value = h.MapLink || '';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal() { document.getElementById('editModal').classList.remove('open'); }

async function doUpdate() {
  const body = {
    id: parseInt(document.getElementById('editId').value),
    Location: document.getElementById('editLocation').value.trim(),
    RentPrice: parseInt(document.getElementById('editRent').value) || null,
    PhoneNumber: parseInt(document.getElementById('editPhone').value) || null,
    MapLink: document.getElementById('editMap').value.trim()
  };
  try {
    const res = await fetch(BASE + '/Update', { method:'PUT', headers: authHeaders(), body: JSON.stringify(body) });
    if (!res.ok) return showMsg('editMsg','Update failed.','error');
    showMsg('editMsg','Updated successfully!','success');
    setTimeout(() => { closeEditModal(); loadMine(); }, 800);
  } catch(e) { showMsg('editMsg','Server error.','error'); }
}

// ─── DELETE ────────────────────────────────────────────────────
async function doDelete(id) {
  if (!confirm('Delete this listing?')) return;
  try {
    const res = await fetch(BASE + '/deleteMyHouse', { method:'DELETE', headers: authHeaders(), body: JSON.stringify({id}) });
    if (!res.ok) return alert('Delete failed.');
    loadMine();
  } catch(e) { alert('Server error.'); }
}

// ─── BOOT ──────────────────────────────────────────────────────
if (token) enterApp();
</script>
</body>
</html>
